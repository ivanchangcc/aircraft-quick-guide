<svg xmlns="http://www.w3.org/2000/svg" width="640" height="220" viewBox="0 0 640 220">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2818"/>
      <stop offset="100%" stop-color="#0a0e17"/>
    </linearGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1a8a5a" stroke-width="0.3" opacity="0.25"/>
    </pattern>
  </defs>
  <rect width="640" height="220" fill="url(#bg)"/>
  <rect width="640" height="220" fill="url(#grid)"/>
  <!-- Engine nacelle shape -->
  <ellipse cx="320" cy="110" rx="72" ry="72" fill="none" stroke="#1a8a5a" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="320" cy="110" rx="52" ry="52" fill="none" stroke="#1a8a5a" stroke-width="1" opacity="0.3"/>
  <ellipse cx="320" cy="110" rx="28" ry="28" fill="#1a8a5a" opacity="0.12"/>
  <!-- Fan blade lines -->
  <line x1="320" y1="38" x2="320" y2="182" stroke="#1a8a5a" stroke-width="0.8" opacity="0.2"/>
  <line x1="248" y1="110" x2="392" y2="110" stroke="#1a8a5a" stroke-width="0.8" opacity="0.2"/>
  <line x1="269" y1="59" x2="371" y2="161" stroke="#1a8a5a" stroke-width="0.8" opacity="0.2"/>
  <line x1="371" y1="59" x2="269" y2="161" stroke="#1a8a5a" stroke-width="0.8" opacity="0.2"/>
  <!-- Side label -->
  <rect x="0" y="155" width="640" height="65" fill="rgba(0,0,0,0.55)"/>
  <text x="32" y="180" font-family="monospace" font-size="10" fill="#1a8a5a" opacity="0.9" letter-spacing="2">GE AEROSPACE</text>
  <text x="32" y="202" font-family="monospace" font-size="17" font-weight="bold" fill="white">GE9X</text>
</svg>